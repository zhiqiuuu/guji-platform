<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>测试相邻书籍按钮</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 p-8">
  <div class="max-w-4xl mx-auto">
    <h1 class="text-2xl font-bold mb-6">测试相邻书籍 API</h1>

    <div class="bg-white p-6 rounded-lg shadow mb-6">
      <h2 class="font-semibold mb-4">输入书籍 ID:</h2>
      <input
        type="text"
        id="bookId"
        value="1fa1f462-9516-43cf-a056-e94251073251"
        class="w-full border border-gray-300 rounded px-3 py-2 mb-4"
        placeholder="输入书籍ID"
      />
      <button
        onclick="fetchAdjacent()"
        class="bg-blue-500 text-white px-4 py-2 rounded hover:bg-blue-600"
      >
        获取相邻书籍
      </button>
    </div>

    <div id="result" class="bg-white p-6 rounded-lg shadow">
      <h2 class="font-semibold mb-4">结果:</h2>
      <pre id="output" class="text-sm text-gray-600 overflow-auto"></pre>
    </div>

    <div id="buttons" class="mt-6 flex gap-4 hidden">
      <button id="prevBtn" class="bg-gray-200 px-4 py-2 rounded hover:bg-gray-300 flex items-center gap-2">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
        </svg>
        <span id="prevTitle">上一篇</span>
      </button>
      <button id="nextBtn" class="bg-gray-200 px-4 py-2 rounded hover:bg-gray-300 flex items-center gap-2">
        <span id="nextTitle">下一篇</span>
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/>
        </svg>
      </button>
    </div>
  </div>

  <script>
    async function fetchAdjacent() {
      const bookId = document.getElementById('bookId').value;
      const output = document.getElementById('output');
      const buttons = document.getElementById('buttons');
      const prevBtn = document.getElementById('prevBtn');
      const nextBtn = document.getElementById('nextBtn');
      const prevTitle = document.getElementById('prevTitle');
      const nextTitle = document.getElementById('nextTitle');

      try {
        output.textContent = '加载中...';
        const response = await fetch(`http://localhost:3001/api/books/${bookId}/adjacent`);
        const data = await response.json();

        output.textContent = JSON.stringify(data, null, 2);

        // 显示/隐藏按钮
        if (data.prev || data.next) {
          buttons.classList.remove('hidden');
        }

        if (data.prev) {
          prevBtn.classList.remove('hidden');
          prevTitle.textContent = data.prev.title;
        } else {
          prevBtn.classList.add('hidden');
        }

        if (data.next) {
          nextBtn.classList.remove('hidden');
          nextTitle.textContent = data.next.title;
        } else {
          nextBtn.classList.add('hidden');
        }
      } catch (err) {
        output.textContent = '错误: ' + err.message;
      }
    }

    // 页面加载时自动测试
    window.onload = () => {
      fetchAdjacent();
    };
  </script>
</body>
</html>
